import java.util.Properties

def localPropertiesFile = new File(rootDir, 'local.properties')
def localProperties = new Properties()

if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

if (!localProperties.getProperty('sdk.dir')) {
    def candidates = []
    def envSdk = System.getenv('ANDROID_SDK_ROOT') ?: System.getenv('ANDROID_HOME')
    if (envSdk) {
        candidates << envSdk
    }

    def localAppData = System.getenv('LOCALAPPDATA')
    if (localAppData) {
        candidates << "${localAppData}/Android/Sdk"
    }

    def userHome = System.getProperty('user.home')
    if (userHome) {
        candidates << "${userHome}/AppData/Local/Android/Sdk"
        candidates << "${userHome}/Library/Android/sdk"
        candidates << "${userHome}/Android/Sdk"
    }

    def detectedSdkDir = candidates.find { candidate ->
        candidate && new File(candidate).exists()
    }

    if (detectedSdkDir) {
        localProperties.setProperty('sdk.dir', detectedSdkDir.replace('\\', '\\\\').replace(':', '\\:'))
        localPropertiesFile.withWriter('UTF-8') { writer ->
            localProperties.store(writer, 'Generated by settings.gradle when Android SDK is auto-detected')
        }
    }
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'
